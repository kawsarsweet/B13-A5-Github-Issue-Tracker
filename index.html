<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-gray-100">

<!-- LOGIN PAGE -->

<div id="loginPage" class="h-screen flex items-center justify-center">

<div class="bg-white w-[380px] p-8 rounded-xl shadow-lg">

<div class="text-center mb-5">

<i class="fa-brands fa-github text-6xl mb-3"></i>

<h2 class="text-xl font-bold">
GitHub Issues Tracker
</h2>

<p class="text-gray-500 text-sm">
Sign in to manage your issues
</p>

</div>


<input id="username"
class="input"
placeholder="Enter Username">

<input id="password"
type="password"
class="input"
placeholder="Enter Password">


<button onclick="login()" class="login-btn">
Sign In
</button>


<div class="bg-gray-100 p-3 mt-4 rounded text-sm">

<p>Username: <b>admin</b></p>
<p>Password: <b>admin123</b></p>

</div>

</div>

</div>

<!-- MAIN PAGE -->

<div id="mainPage" class="hidden">


<!-- NAVBAR -->

<nav class="bg-white px-6 py-4 flex justify-between items-center shadow">

<div class="flex items-center gap-2">

<i class="fa-brands fa-github text-xl"></i>
<h3 class="font-semibold">Issues Tracker</h3>

</div>


<div class="flex gap-2">

<input id="searchInput"
class="border px-3 py-1 rounded"
placeholder="Search issue...">

<button onclick="searchIssue()"
class="bg-purple-600 text-white px-3 py-1 rounded">

<i class="fa fa-search"></i>

</button>

</div>

</nav>



<div class="p-6">


<!-- TABS -->

<div class="flex gap-3 mb-5">

<button class="tab active"
onclick="changeTab('all',this)">
All
</button>

<button class="tab"
onclick="changeTab('open',this)">
Open
</button>

<button class="tab"
onclick="changeTab('closed',this)">
Closed
</button>

</div>



<!-- ISSUE HEADER -->

<div
class="bg-white p-5 rounded-lg flex justify-between items-center mb-6">

<div class="flex items-center gap-4">

<i class="fa-solid fa-circle-dot text-purple-600 text-2xl"></i>

<div>

<h3 id="issueCount"
class="text-lg font-bold">
0 Issues
</h3>

<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>

</div>

</div>


<div class="flex gap-6 text-sm">

<span class="text-green-600">
<i class="fa-solid fa-circle text-xs"></i>
Open
</span>

<span class="text-purple-600">
<i class="fa-solid fa-circle text-xs"></i>
Closed
</span>

</div>

</div>



<div id="loader" class="loader"></div>


<div id="issuesContainer"
class="grid grid-cols-4 gap-6"></div>


</div>

</div>



<!-- MODAL -->

<div id="modal" class="modal">

<div class="modal-box">

<button onclick="closeModal()" class="close-btn">
Close
</button>

<h2 id="mTitle"
class="text-xl font-bold mb-3"></h2>


<div class="flex gap-2 mb-3">

<span id="mStatus" class="status-tag"></span>
<span id="mLabel" class="label-tag"></span>

</div>


<p id="mDesc"
class="text-gray-600 mb-4"></p>


<div
class="flex justify-between bg-gray-100 p-3 rounded">

<p><b>Author:</b> <span id="mAuthor"></span></p>
<p><b>Priority:</b> <span id="mPriority"></span></p>

</div>


<p class="text-gray-400 text-sm mt-3"
id="mDate"></p>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
